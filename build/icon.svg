<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b79fff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2db7f2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#grad)"/>
  <g transform="translate(48, 48)" filter="url(#glow)">
    <!-- Terminal Window -->
    <rect x="0" y="0" width="160" height="120" rx="12" fill="#1a1a2e" opacity="0.9"/>
    <rect x="0" y="0" width="160" height="24" rx="12" fill="#252542"/>
    <rect x="0" y="12" width="160" height="12" fill="#252542"/>
    <!-- Window Controls -->
    <circle cx="16" cy="12" r="4" fill="#ff6e84"/>
    <circle cx="32" cy="12" r="4" fill="#ffd166"/>
    <circle cx="48" cy="12" r="4" fill="#06d6a0"/>
    <!-- Terminal Content -->
    <text x="16" y="52" font-family="monospace" font-size="16" fill="#b79fff">$</text>
    <rect x="32" y="42" width="80" height="4" rx="2" fill="#b79fff" opacity="0.6"/>
    <rect x="32" y="52" width="60" height="4" rx="2" fill="#2db7f2" opacity="0.6"/>
    <rect x="16" y="72" width="100" height="4" rx="2" fill="#aaabb0" opacity="0.4"/>
    <rect x="16" y="84" width="80" height="4" rx="2" fill="#aaabb0" opacity="0.4"/>
    <!-- Cursor -->
    <rect x="16" y="96" width="8" height="12" fill="#2db7f2">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Neural Network Decoration -->
  <circle cx="200" cy="200" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="220" cy="180" r="3" fill="#ffffff" opacity="0.2"/>
  <circle cx="180" cy="220" r="3" fill="#ffffff" opacity="0.2"/>
  <line x1="200" y1="200" x2="220" y2="180" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="180" y2="220" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
</svg>