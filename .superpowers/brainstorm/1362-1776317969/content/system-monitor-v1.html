<h2>系统监控区设计</h2>
<p class="subtitle">终端底部显示 CPU/RAM 状态的区域</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">当前设计（旧）</div>
    <div class="mockup-body" style="background: #0c0e12; padding: 20px;">
      <div style="background: rgba(17, 19, 24, 0.6); border: 1px solid rgba(70, 72, 77, 0.15); border-radius: 12px; padding: 16px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span style="font-size: 10px; color: #aaabb0; text-transform: uppercase;">系统负载</span>
          <span style="font-size: 10px; color: #2db7f2;">稳定</span>
        </div>
        <div style="height: 6px; background: rgba(29, 32, 37, 0.8); border-radius: 3px;">
          <div style="width: 35%; height: 100%; background: linear-gradient(90deg, #2db7f2, #b79fff); border-radius: 3px;"></div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 10px; color: #aaabb0;">
          <span>CPU: 25%</span>
          <span>RAM: 2.1 GB / 16 GB</span>
        </div>
      </div>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">赛博朋克设计（新）</div>
    <div class="mockup-body" style="background: #0a0a12; padding: 20px;">
      <div style="background: rgba(0,0,0,0.8); border: 1px solid rgba(0,255,255,0.2); border-radius: 8px; padding: 16px; box-shadow: 0 0 20px rgba(0,255,255,0.05);">
        <!-- 标题区 -->
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
          <span style="color: #00ffff; font-size: 10px; text-transform: uppercase; text-shadow: 0 0 5px rgba(0,255,255,0.3);">◈ 系统状态</span>
          <div style="flex: 1;"></div>
          <div style="display: flex; align-items: center; gap: 4px;">
            <div style="width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 6px #00ff88;"></div>
            <span style="color: #00ff88; font-size: 10px; text-shadow: 0 0 4px rgba(0,255,136,0.3);">ONLINE</span>
          </div>
        </div>

        <!-- 进度条 -->
        <div style="height: 4px; background: rgba(0,255,255,0.1); border-radius: 2px; overflow: hidden;">
          <div style="width: 35%; height: 100%; background: linear-gradient(90deg, #00ffff, #ff00ff); border-radius: 2px; box-shadow: 0 0 10px rgba(0,255,255,0.5);"></div>
        </div>

        <!-- 数据显示 -->
        <div style="display: flex; gap: 24px; margin-top: 12px;">
          <div>
            <div style="color: rgba(255,255,255,0.5); font-size: 9px;">CPU</div>
            <div style="color: #00ffff; font-size: 14px; font-family: monospace; text-shadow: 0 0 5px rgba(0,255,255,0.3);">25%</div>
          </div>
          <div style="border-left: 1px solid rgba(0,255,255,0.2); padding-left: 24px;">
            <div style="color: rgba(255,255,255,0.5); font-size: 9px;">RAM</div>
            <div style="color: #ff00ff; font-size: 14px; font-family: monospace; text-shadow: 0 0 5px rgba(255,0,255,0.3);">2.1<span style="font-size: 10px; color: rgba(255,0,255,0.6);">GB</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div style="margin-top: 24px;">
  <p class="label">设计改进</p>
  <ul style="color: #888; margin-top: 8px; padding-left: 20px; font-size: 13px;">
    <li>边框改为 Cyan 光效，呼应整体风格</li>
    <li>状态指示灯改为发光小球，更直观</li>
    <li>进度条使用 Cyan→Magenta 渐变 + 发光</li>
    <li>数据分列显示，CPU Cyan / RAM Magenta 区分</li>
    <li>数字带微光效果，提升科技感</li>
  </ul>
</div>

<div class="options" style="margin-top: 24px;">
  <div class="option" data-choice="approve" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>喜欢系统监控设计</h3>
      <p>设计方案已完整，准备总结</p>
    </div>
  </div>
  <div class="option" data-choice="adjust" onclick="toggleSelect(this)">
    <div class="letter">↻</div>
    <div class="content">
      <h3>需要调整</h3>
      <p>告诉我想法</p>
    </div>
  </div>
</div>
